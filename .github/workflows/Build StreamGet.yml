name: Build StreamGet Executable

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取所有历史记录，包括标签

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Get current timestamp
      id: timestamp
      run: echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create tag for release
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git tag build-${{ steps.timestamp.outputs.timestamp }}
        git push origin build-${{ steps.timestamp.outputs.timestamp }}

    - name: Build executable
      run: |
        python build.py --path cli.py  # 使用正确的 cli.py 文件

    - name: Rename executable with timestamp
      run: |
        cd dist
        mv streamget.exe streamget_${{ steps.timestamp.outputs.timestamp }}.exe

    - name: Create Release with executable
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ steps.timestamp.outputs.timestamp }}
        name: Build ${{ steps.timestamp.outputs.timestamp }}
        files: dist/streamget_${{ steps.timestamp.outputs.timestamp }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
