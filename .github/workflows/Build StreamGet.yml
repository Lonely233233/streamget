name: Build StreamGet Executable

on:
  workflow_dispatch:  # 只保留手动触发

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Get current timestamp
      id: timestamp
      run: echo "::set-output name=timestamp::$(date -u +'%Y%m%d%H%M%S')"

    - name: Build executable
      run: |
        python build.py --path cli.py

    - name: Rename executable with timestamp
      run: |
        cd dist
        mv streamget.exe streamget_${{ steps.timestamp.outputs.timestamp }}.exe

    - name: Upload Windows executable to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/streamget_${{ steps.timestamp.outputs.timestamp }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux-bin:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Get current timestamp
      id: timestamp
      run: echo "::set-output name=timestamp::$(date -u +'%Y%m%d%H%M%S')"

    - name: Build executable
      run: |
        python build.py --path cli.py

    - name: Rename executable with timestamp
      run: |
        cd dist
        mv streamget streamget_${{ steps.timestamp.outputs.timestamp }}

    - name: Upload Linux executable to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/streamget_${{ steps.timestamp.outputs.timestamp }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
